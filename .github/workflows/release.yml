name: Release

# Publishes vibebreak-arcade to npm whenever a SemVer tag (vX.Y.Z) is pushed.
#
# One-time setup before publishing:
#   1. Configure npm trusted publishing for this package:
#      Provider: GitHub Actions
#      Organization/user: tacotuesday8888
#      Repository: vibebreak
#      Workflow filename: release.yml
#   2. Make sure `package.json` `version` matches the tag you push.
#      `npm version patch|minor|major` updates package.json AND creates the tag.
#
# Cutting a release:
#   npm version patch
#   git push --follow-tags
#
# The workflow then runs tests and publishes through npm trusted publishing.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
