name: Release

# Publishes vibebreak-arcade to npm whenever a SemVer tag (vX.Y.Z) is pushed.
#
# One-time setup before publishing:
#   1. Create a granular npm access token at https://www.npmjs.com/settings/<your-user>/tokens
#      with package read/write access and 2FA bypass for CI publishing.
#   2. Add it as a repository secret named `NPM_TOKEN`
#      (Settings -> Secrets and variables -> Actions -> New repository secret).
#   3. Make sure `package.json` `version` matches the tag you push.
#      `npm version patch|minor|major` updates package.json AND creates the tag.
#
# Cutting a release:
#   npm version patch
#   git push --follow-tags
#
# The workflow then runs tests, builds, and publishes with provenance.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
